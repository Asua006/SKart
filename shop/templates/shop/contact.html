{% extends 'shop/basic.html' %}

{% block title %}Contact Us - SKart{% endblock %}

{% block body %}
<div class="container mt-5" style="max-width: 700px;">
    <div class="card p-4 shadow-lg" style="background-color: rgba(159, 142, 220, 0.9); border: none;">
        <h2 class="text-center mb-4">Get in Touch</h2>
        <hr>
        <form action="/contact/" method="post">{% csrf_token %}
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="Your phone number">
            </div>
            <div class="mb-3">
                <label for="desc" class="form-label">How can we help you?</label>
                <textarea class="form-control" id="desc" name="desc" rows="4" placeholder="Type your message here..."></textarea>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
            </div>
        </form>
    </div>
</div>
<br><br>
{% endblock %}
