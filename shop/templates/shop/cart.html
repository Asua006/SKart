{% extends 'shop/basic.html' %}

{% block title %}Cart{% endblock %}

{% block body %}
<br></br>
<div class="container mt-4">
  <h1 class="text-center">Your Cart</h1>
  <hr>
  <div id="cartItems"></div>
  <div class="mt-4">
    <h4>Total Amount: ₹<span id="totalAmount">0</span></h4>
    <button class="btn btn-danger" id="clearCart">Clear All</button>
  </div>
</div>
<br></br>
<hr>


    <div class="col my-4" style="max-width: 600px; margin: auto;" > 
        <h2> Enter Details:</h2>
        <form method="post" action="/cart/">{% csrf_token %}
            <input type="hidden" name="itemsJson" id="itemsJson">
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="inputname">Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Name">
                </div>
                <div class="form-group col-md-6">
                    <label for="inputEmail4">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Email">
                </div>
            </div>
            <div class="form-group">
                <label for="inputAddress">Address</label>
                <input type="text" class="form-control" id="address1" name="address1" placeholder="1234 Main St">
            </div>
            <div class="form-group">
                <label for="inputAddress2">Address line 2</label>
                <input type="text" class="form-control" id="address2" name="address2" placeholder="Apartment, studio, or floor">
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="inputCity">City</label>
                    <input type="text" class="form-control" id="city" name="city">
                </div>
                <div class="form-group col-md-4">
                    <label for="inputState">State</label>
                    <input type="text" class="form-control" id="state" name="state"  placeholder="Enter State">
                </div>
                <div class="form-group col-md-2">
                    <label for="inputZip">Zip</label>
                    <input type="text" class="form-control" id="zip_code" name="zip_code">
                </div>
            </div>
            <div class="form-group">
                <label for="inputZip">Phone Number</label>
                <input type="tel" class="form-control" id="phone" name="phone">
            </div>
            <button type="submit" class="btn btn-primary">Place Order</button>
        </form>
    </div>
</div>

{% block js %}

<script>
  document.querySelector('form').addEventListener('submit', function(e) {
    // Save cart to hidden input before submitting
    document.getElementById('itemsJson').value = localStorage.getItem('cart') || '{}';
  });
  const allProducts = {{ products_json|safe }};

  function renderCart() {
    const cart = JSON.parse(localStorage.getItem('cart')) || {};
    const cartItemsDiv = document.getElementById('cartItems');
    cartItemsDiv.innerHTML = '';
    let total = 0;
    let hasItems = false;

    for (const id in cart) {
      if (allProducts[id]) {
        hasItems = true;
        const qty = cart[id];
        const prod = allProducts[id];
        const itemTotal = qty * prod.price;
        total += itemTotal;

        cartItemsDiv.innerHTML += `
          <div class="card mb-3" style="max-width: 540px;">
            <div class="row g-0">
              <div class="col-md-4">
                <img src="${prod.image}" class="img-fluid rounded-start" alt="${prod.name}">
              </div>
              <div class="col-md-8">
                <div class="card-body">
                  <h5 class="card-title">${prod.name}</h5>
                  <p class="card-text">₹${prod.price} × ${qty} = <strong>₹${itemTotal}</strong></p>
                  <button class="btn btn-danger btn-sm" onclick="removeItem('${id}')">Remove</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }
    }

    if (!hasItems) {
      cartItemsDiv.innerHTML = "<p>Your cart is empty.</p>";
    }

    document.getElementById('totalAmount').innerText = total;
  }

  function removeItem(id) {
    let cart = JSON.parse(localStorage.getItem('cart')) || {};
    if (cart[id] > 1) {
      cart[id] -= 1;
    } else {
      delete cart[id];
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  }

  function clearCart() {
    localStorage.removeItem('cart');
    renderCart();
  }

  document.getElementById('clearCart').onclick = clearCart;
  document.addEventListener("DOMContentLoaded", renderCart);
</script>
{% endblock %}
{% endblock %}
