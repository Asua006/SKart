<!-- Bootstrap Bundle JS (required) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<!-- JS
 -->

<script>
  if(localStorage.getItem('Cart') == null){
  var cart = {};
  }
  else
  {
  cart = JSON.parse(localStorage.getItem('cart'));
  document.getElementById('Cart').innerHTML = Object.keys(cart).length;
  }
  $('.cart').click(function(){
  console.log('clicked');
  var idstr = this.id.toString();
  console.log(idstr);
  if (cart[idstr] !=undefined){
  cart[idstr] = cart[idstr] + 1;
  }
  else
  {
  cart[idstr] = 1;
  }
  console.log(cart);
  localStorage.setItem('cart', JSON.stringify(cart));
  document.getElementById('Cart').innerHTML = Object.keys(cart).length;
  });
  $('#popcart').popover();
  document.getElementById("cart").setAttribute('data-content', '<h5>Cart for your items in my shopping cart</h5>');
  
  document.addEventListener("DOMContentLoaded", function () {
  let cart = localStorage.getItem('cart') ? JSON.parse(localStorage.getItem('cart')) : {};

  // Function to update cart display count
  function updateCartCount() {
    let totalItems = 0;
    for (let item in cart) {
      totalItems += cart[item];
    }
    document.getElementById('Cart').innerHTML = totalItems;
  }

  updateCartCount();

  // Add to cart on click
  $('.cart').click(function () {
    const idstr = this.id.toString();
    cart[idstr] = cart[idstr] ? cart[idstr] + 1 : 1;
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
  });

  // Popover (optional)
  let popcart = document.getElementById("popcart");
  if (popcart) {
    $('#popcart').popover();
    popcart.setAttribute('data-content', '<h5>Cart for your items in my shopping cart</h5>');
  }
});


</script>
